# Gemmini HW SEARCH CONFIG (matches DOSA constant_pe=False mode = paper-defensible setup)
# Agent chooses pe_dim, sp_size, acc_size per submission.
name: gemmini_search_space

# Agent-searchable HW (per submission via candidate.yaml → hw.{pe_dim, sp_size, acc_size})
# pe_dim range matches DOSA's `gen_random_hw_config`: 2 ** randrange(1, 8) → [2, 4, 8, 16, 32, 64, 128]
pe_dim_range: [2, 128]     # PE array side-length; total PEs = pe_dim × pe_dim
# sp_size / acc_size range matches DOSA's `random_arch_configs`: 2 ** randrange(0, 12) → max 2^11
sp_size_range: [1, 2048]   # KB; integer powers of 2 recommended
acc_size_range: [1, 2048]  # KB; integer powers of 2 recommended

# Reference "default" Gemmini (orientation only)
default_pe_dim: 16
default_sp_size: 128
default_acc_size: 32
